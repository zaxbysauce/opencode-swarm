name: release-and-publish

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Upgrade npm
        run: npm i -g npm@11.5.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run clean && bun run scripts/copy-grammars.ts && bun build src/index.ts --outdir dist --target bun --format esm && bun build src/cli/index.ts --outdir dist/cli --target bun --format esm && bun run scripts/copy-grammars.ts --to-dist

      - name: Publish to npm
        run: |
          echo "Trying OIDC trusted publishing..."
          if npm publish --provenance --access public; then
            exit 0
          fi
          echo "OIDC publish failed; retrying with NPM_TOKEN fallback..."
          NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-release-notes:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Aggregate pending release-note fragments into the GitHub Release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: node scripts/release-notes-fragments.mjs update-release

  update-pr-notes:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created != 'true' }}
    runs-on: ubuntu-latest
    # Serialize this job across concurrent merges to main. Two updates
    # would otherwise race on read-modify-write of the release PR body
    # (each run reads the current body, recomputes notes from its own
    # checkout, then `gh pr edit`s — last writer would silently win and
    # could overwrite fragments added between the read and the write).
    concurrency:
      group: update-pr-notes
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Aggregate pending release-note fragments into the release PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/release-notes-fragments.mjs update-pr

