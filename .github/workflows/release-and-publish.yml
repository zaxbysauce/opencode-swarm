name: release-and-publish

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Upgrade npm
        run: npm i -g npm@11.5.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Validate packed npm artifact
        run: bun run package:smoke

      - name: Publish to npm
        run: |
          echo "Trying OIDC trusted publishing..."
          if npm publish --provenance --access public; then
            exit 0
          fi
          echo "OIDC publish failed; retrying with NPM_TOKEN fallback..."
          NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-release-notes:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Aggregate pending release-note fragments into the GitHub Release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: node scripts/release-notes-fragments.mjs update-release

  update-pr-notes:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created != 'true' }}
    runs-on: ubuntu-latest
    # Serialize this job across concurrent merges to main. Two updates
    # would otherwise race on read-modify-write of the release PR body
    # (each run reads the current body, recomputes notes from its own
    # checkout, then `gh pr edit`s — last writer would silently win and
    # could overwrite fragments added between the read and the write).
    concurrency:
      group: update-pr-notes
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Aggregate pending release-note fragments into the release PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/release-notes-fragments.mjs update-pr

