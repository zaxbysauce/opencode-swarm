name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck
      - name: Biome CI
        run: bunx biome ci .

  unit:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Unit tests (hooks)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import os
          import subprocess
          import sys

          root = os.getcwd()
          files = sorted(set(
              glob.glob(os.path.join(root, 'tests/unit/hooks/*.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/hooks/*.adversarial.test.ts'))
          ))

          for file_path in files:
              rel = os.path.relpath(file_path, root)
              print(f'==> {rel}')
              result = subprocess.run(
                  ['bun', '--smol', 'test', rel, '--timeout', '30000'],
                  cwd=root,
              )
              if result.returncode != 0:
                  sys.exit(result.returncode)
          PY
      - name: Unit tests (cli)
        run: bun --smol test tests/unit/cli --timeout 120000
      - name: Unit tests (commands, config)
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import os
          import subprocess
          import sys

          root = os.getcwd()
          files = sorted(set(
              glob.glob(os.path.join(root, 'tests/unit/commands/*.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/config/*.test.ts')) +
              glob.glob(os.path.join(root, 'src/commands/*.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/git/*.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/cli-dispatch.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/index-commands.test.ts'))
          ))

          for file_path in files:
              rel = os.path.relpath(file_path, root)
              print(f'==> {rel}')
              result = subprocess.run(
                  ['bun', '--smol', 'test', rel, '--timeout', '30000'],
                  cwd=root,
              )
              if result.returncode != 0:
                  sys.exit(result.returncode)
          PY
      - name: Unit tests (tools)
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import os
          import subprocess
          import sys

          root = os.getcwd()
          # Run tools per-file to avoid vi.mock leakage between test files
          tool_files = sorted(glob.glob(os.path.join(root, 'tests/unit/tools/*.test.ts')))
          for file_path in tool_files:
              rel = os.path.relpath(file_path, root)
              print(f'==> {rel}')
              result = subprocess.run(
                  ['bun', '--smol', 'test', rel, '--timeout', '30000'],
                  cwd=root,
              )
              if result.returncode != 0:
                  sys.exit(result.returncode)
          PY
      - name: Unit tests (services, build, quality, sast, sbom, scripts)
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import os
          import subprocess
          import sys

          root = os.getcwd()
          # Run services per-file to avoid vi.mock leakage between test files
          service_files = sorted(glob.glob(os.path.join(root, 'tests/unit/services/*.test.ts')))
          for file_path in service_files:
              rel = os.path.relpath(file_path, root)
              print(f'==> {rel}')
              result = subprocess.run(
                  ['bun', '--smol', 'test', rel, '--timeout', '30000'],
                  cwd=root,
              )
              if result.returncode != 0:
                  sys.exit(result.returncode)
          PY
          python - <<'PY2'
          import glob
          import os
          import subprocess
          import sys

          root = os.getcwd()
          # Run build/quality/sast/sbom/scripts per-file to avoid vi.mock leakage
          other_files = sorted(set(
              glob.glob(os.path.join(root, 'tests/unit/build/*.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/quality/*.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/sast/*.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/sbom/*.test.ts')) +
              glob.glob(os.path.join(root, 'tests/unit/scripts/*.test.ts'))
          ))
          for file_path in other_files:
              rel = os.path.relpath(file_path, root)
              print(f'==> {rel}')
              result = subprocess.run(
                  ['bun', '--smol', 'test', rel, '--timeout', '30000'],
                  cwd=root,
              )
              if result.returncode != 0:
                  sys.exit(result.returncode)
          PY2
      - name: Unit tests (state, agents, knowledge, evidence, plan, misc)
        run: bun --smol test tests/unit/adversarial tests/unit/agents tests/unit/background tests/unit/context tests/unit/diff tests/unit/evidence tests/unit/helpers tests/unit/knowledge tests/unit/lang tests/unit/output tests/unit/parallel tests/unit/plan tests/unit/session tests/unit/skills tests/unit/types tests/unit/utils tests/unit/stale-delegation-guard.test.ts tests/unit/state-invocation-windows.test.ts tests/unit/state-rehydrate.test.ts tests/unit/state-turbo-mode.test.ts tests/unit/state-workflow-guard.adversarial.test.ts tests/unit/state-workflow-guard.test.ts tests/unit/state.adversarial-scope.test.ts tests/unit/state.adversarial.test.ts tests/unit/state.rehydrate.adversarial.test.ts tests/unit/state.test.ts tests/unit/version-bump.test.ts --timeout 120000

  integration:
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Integration tests
        run: bun test tests/integration ./test --timeout 120000

  security:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Security tests
        run: bun test tests/security --timeout 120000

  smoke:
    needs: [unit, integration]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build package
        run: bun run build
      - name: Smoke tests
        run: bun test tests/smoke --timeout 120000
