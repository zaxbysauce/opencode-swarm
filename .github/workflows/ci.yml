              # bun exited non-zero — check if it was a real failure or crash
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed
      - name: Unit tests (services, build, quality, sast, sbom, scripts)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          # Per-file isolation to prevent --smol cache poisoning (#330).
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for dir in tests/unit/services tests/unit/build tests/unit/quality tests/unit/sast tests/unit/sbom tests/unit/scripts; do
            for f in "$dir"/*.test.ts; do
              [ -f "$f" ] || continue
              tmp="$tmpdir/bun-out-$$-${f##*/}"
              exit_code=0
              bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
              if [ $exit_code -ne 0 ]; then
                # bun exited non-zero — check if it was a real failure or crash
                if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                  echo "::error file=$f::FAILED: $f"
                  failed=1
                fi
              fi
            done
          done
          exit $failed
      - name: Unit tests (sandbox)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          # Per-file isolation to prevent --smol cache poisoning (#330).
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          while IFS= read -r -d '' f; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
            rm -f "$tmp"
          done < <(find tests/unit/sandbox -name '*.test.ts' -type f -print0)
          exit $failed
      - name: Unit tests (state, agents, knowledge, evidence, plan, misc)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          # Per-file isolation to prevent --smol cache poisoning (#330).
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for dir in tests/unit/adversarial tests/unit/agents tests/unit/background tests/unit/context tests/unit/council tests/unit/diff tests/unit/evidence tests/unit/git tests/unit/helpers tests/unit/knowledge tests/unit/lang tests/unit/output tests/unit/parallel tests/unit/plan tests/unit/session tests/unit/skills tests/unit/types tests/unit/utils; do
            for f in "$dir"/*.test.ts; do
              [ -f "$f" ] || continue
              tmp="$tmpdir/bun-out-$$-${f##*/}"
              exit_code=0
              bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
              if [ $exit_code -ne 0 ]; then
                # bun exited non-zero — check if it was a real failure or crash
                if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                  echo "::error file=$f::FAILED: $f"
                  failed=1
                fi
              fi
              rm -f "$tmp"
            done
          done
          # Standalone test files
          for f in tests/unit/cli-dispatch.test.ts tests/unit/index-commands.test.ts tests/unit/stale-delegation-guard.test.ts tests/unit/state-invocation-windows.test.ts tests/unit/state-rehydrate.test.ts tests/unit/state-turbo-mode.test.ts tests/unit/state-workflow-guard.adversarial.test.ts tests/unit/state-workflow-guard.test.ts tests/unit/state.adversarial-scope.test.ts tests/unit/state.adversarial.test.ts tests/unit/state.rehydrate.adversarial.test.ts tests/unit/state.test.ts tests/unit/version-bump.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              # bun exited non-zero — check if it was a real failure or crash
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
            rm -f "$tmp"
          done
          exit $failed

  integration:
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Integration tests
        shell: bash
        run: |
          # Per-file isolation to prevent module cache poisoning and process.chdir
          # contamination across integration test files (#330 pattern).
          set -o pipefail
          IFS=$'\n'
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-int-*' EXIT
          for f in tests/integration/*.test.ts ./test/*.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-int-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed

  dist-check:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Check dist/ for uncommitted drift
        shell: bash
        run: |
          # Normalize .bun cache paths in COMMITTED dist for cross-platform consistency.
          # Windows bun produces node_modules/.bun/PACKAGE@VERSION/node_modules/PACKAGE
          # while Linux bun produces node_modules/PACKAGE.
          # After build, dist/ has clean Linux paths. We must normalize the committed
          # (git index) side before comparing, not the freshly built working tree.
          #
          # Also normalize var __dirname = "..." values: bun ESM bundles embed the
          # build-time source path, which differs between Windows and Linux builders.
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          dist_committed="$tmpdir/dist-committed"
          mkdir -p "$dist_committed"
          git archive HEAD dist/ | tar -x -C "$dist_committed"
          find "$dist_committed/dist/" -name "*.js" -type f -exec sed -i \
            -e 's|node_modules/\.bun/[^/]\+/node_modules/|node_modules/|g' \
            -e 's/\r$//' \
            -e 's|var __dirname = "[^"]*"|var __dirname = "__DIRNAME_NORMALIZED__"|g' {} +
          # Normalize __dirname in the freshly built dist too (Linux vs Windows paths).
          find dist/ -name "*.js" -type f -exec sed -i \
            -e 's|var __dirname = "[^"]*"|var __dirname = "__DIRNAME_NORMALIZED__"|g' {} +
          # Remove gitignored paths from the freshly built dist before comparing.
          # These are intentionally excluded from commits (see .gitignore lines 29-35).
          rm -rf dist/build/ dist/quality/ dist/sbom/
          rm -f dist/tools/build-check.d.ts dist/tools/pre-check-batch.d.ts \
                dist/tools/quality-budget.d.ts dist/tools/sbom-generate.d.ts
          diff -r "$dist_committed/dist/" dist/ || {
            echo "ERROR: dist/ has uncommitted changes after build."
            echo ""
            echo "Recovery (run these commands in order):"
            echo "  1. bun install --frozen-lockfile --force  # refresh nested deps to match CI"
            echo "  2. bun run build                         # regenerate dist/"
            echo "  3. Verify the dist/ diff is expected: git diff -- dist/"
            echo "  4. Commit the regenerated dist/ and push"
            echo ""
            echo "Common causes:"
            echo "  - Local bun version differs from CI (CI pins bun 1.3.13)"
            echo "  - Nested dependency versions differ between local and CI install"
            echo "  - Stale dist/ after rebase on a newer origin/main"
            exit 1
          }
          rm -rf "$dist_committed"

  package-check:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Validate packed npm artifact
        run: bun run package:smoke

  security:
