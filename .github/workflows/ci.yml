name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck
      - name: Biome CI
        run: bunx biome ci .

  unit:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Unit tests (hooks - guardrails)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/guardrails*.test.ts --timeout 120000
      - name: Unit tests (hooks - knowledge types/validator/store)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/knowledge-types*.test.ts tests/unit/hooks/knowledge-validator*.test.ts tests/unit/hooks/knowledge-registration*.test.ts tests/unit/hooks/knowledge-store*.test.ts tests/unit/hooks/knowledge-quarantine*.test.ts --timeout 120000
      - name: Unit tests (hooks - knowledge reader/migrator)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/knowledge-reader*.test.ts tests/unit/hooks/knowledge-migrator*.test.ts --timeout 120000
      - name: Unit tests (hooks - knowledge injector)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/knowledge-injector*.test.ts --timeout 120000
      - name: Unit tests (hooks - knowledge-curator)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/knowledge-curator*.test.ts --timeout 120000
      - name: Unit tests (hooks - curator)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/curator*.test.ts --timeout 120000
      - name: Unit tests (hooks - hive)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/hive*.test.ts --timeout 120000
      - name: Unit tests (hooks - system-enhancer load-evidence)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/system-enhancer-load-evidence*.test.ts --timeout 120000
      - name: Unit tests (hooks - system-enhancer)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/system-enhancer-adversarial.attack.test.ts tests/unit/hooks/system-enhancer-adversarial.test.ts tests/unit/hooks/system-enhancer-compaction.test.ts tests/unit/hooks/system-enhancer-context-budget-wiring.test.ts tests/unit/hooks/system-enhancer-drift.test.ts tests/unit/hooks/system-enhancer-handoff.test.ts tests/unit/hooks/system-enhancer-hf1b-adversarial.test.ts tests/unit/hooks/system-enhancer-hf1b.test.ts tests/unit/hooks/system-enhancer-lang-constraints-adversarial.test.ts tests/unit/hooks/system-enhancer-lang-constraints.test.ts tests/unit/hooks/system-enhancer-retro.test.ts tests/unit/hooks/system-enhancer-reviewer-checklist-adversarial.test.ts tests/unit/hooks/system-enhancer-reviewer-checklist.test.ts tests/unit/hooks/system-enhancer-task2-1-adversarial.test.ts tests/unit/hooks/system-enhancer-task2-1.test.ts tests/unit/hooks/system-enhancer-task2-2.test.ts tests/unit/hooks/system-enhancer-task2-3-adversarial.test.ts tests/unit/hooks/system-enhancer-task2-3.test.ts tests/unit/hooks/system-enhancer-task2-4.test.ts tests/unit/hooks/system-enhancer-task3-4.test.ts tests/unit/hooks/system-enhancer-v6.test.ts tests/unit/hooks/system-enhancer-v61.test.ts tests/unit/hooks/system-enhancer-v62-adversarial.test.ts tests/unit/hooks/system-enhancer-v62.test.ts tests/unit/hooks/system-enhancer.test.ts --timeout 120000
      - name: Unit tests (hooks - delegation)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/delegation*.test.ts --timeout 120000
      - name: Unit tests (hooks - adversarial-detector)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/adversarial-detect*.test.ts --timeout 120000
      - name: Unit tests (hooks - remaining)
        if: runner.os != 'Windows'
        run: bun --smol test tests/unit/hooks/advisory*.test.ts tests/unit/hooks/agent*.test.ts tests/unit/hooks/co-change*.test.ts tests/unit/hooks/compaction*.test.ts tests/unit/hooks/context*.test.ts tests/unit/hooks/dark*.test.ts tests/unit/hooks/extractors*.test.ts tests/unit/hooks/gate*.test.ts tests/unit/hooks/log*.test.ts tests/unit/hooks/message*.test.ts tests/unit/hooks/mode*.test.ts tests/unit/hooks/model*.test.ts tests/unit/hooks/phase*.test.ts tests/unit/hooks/pipeline*.test.ts tests/unit/hooks/plan*.test.ts tests/unit/hooks/self*.test.ts tests/unit/hooks/steering*.test.ts tests/unit/hooks/system-message*.test.ts tests/unit/hooks/tool*.test.ts tests/unit/hooks/utils*.test.ts --timeout 120000
      - name: Unit tests (commands, config)
        run: bun --smol test tests/unit/commands tests/unit/config --timeout 120000
      - name: Unit tests (cli)
        run: bun --smol test tests/unit/cli --timeout 120000
      - name: Unit tests (tools)
        shell: bash
        # continue-on-error until pre-existing tool test bugs are fixed
        continue-on-error: true
        run: |
          # Run each tools test file in its own process to prevent
          # --smol module cache poisoning across files (#330).
          failed=0
          for f in tests/unit/tools/*.test.ts; do
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (services, build, quality, sast, sbom, scripts)
        run: bun --smol test tests/unit/services tests/unit/build tests/unit/quality tests/unit/sast tests/unit/sbom tests/unit/scripts --timeout 120000
      - name: Unit tests (state, agents, knowledge, evidence, plan, misc)
        run: bun --smol test tests/unit/adversarial tests/unit/agents tests/unit/background tests/unit/context tests/unit/diff tests/unit/evidence tests/unit/git tests/unit/helpers tests/unit/knowledge tests/unit/lang tests/unit/output tests/unit/parallel tests/unit/plan tests/unit/session tests/unit/skills tests/unit/types tests/unit/utils tests/unit/cli-dispatch.test.ts tests/unit/index-commands.test.ts tests/unit/stale-delegation-guard.test.ts tests/unit/state-invocation-windows.test.ts tests/unit/state-rehydrate.test.ts tests/unit/state-turbo-mode.test.ts tests/unit/state-workflow-guard.adversarial.test.ts tests/unit/state-workflow-guard.test.ts tests/unit/state.adversarial-scope.test.ts tests/unit/state.adversarial.test.ts tests/unit/state.rehydrate.adversarial.test.ts tests/unit/state.test.ts tests/unit/version-bump.test.ts --timeout 120000

  integration:
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Integration tests
        run: bun test tests/integration ./test --timeout 120000

  security:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Security tests
        run: bun test tests/security --timeout 120000

  smoke:
    needs: [unit, integration]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build package
        run: bun run build
      - name: Smoke tests
        run: bun test tests/smoke --timeout 120000
