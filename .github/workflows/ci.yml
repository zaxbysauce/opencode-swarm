name: CI

on:
  pull_request:
    branches: ["**"]
  # Required checks must also run for merge-queue merge groups, otherwise queued
  # PRs never receive their required check runs and the queue cannot merge them
  # (see issue #1046). Keep `pull_request` for early per-PR feedback.
  merge_group:
    types: [checks_requested]

# Serialize CI runs for the same branch/PR. Old runs are NOT cancelled because
# cancelling leaves stale check statuses that persist on PRs and block merging
# even after a new successful run completes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Fast (~5s) detection of release-please branches. Works for both PR events
  # (checks github.head_ref) and merge-queue events (checks commit messages
  # since github.head_ref is unavailable in merge groups).
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      is-release: ${{ steps.check.outputs.is-release }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: github.event_name == 'merge_group'
        with:
          fetch-depth: 10
      - name: Detect release-please
        id: check
        shell: bash
        run: |
          if [[ "$BRANCH" == release-please--* ]]; then
            echo "is-release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Inspect ONLY the merge-group head commit (-1), not a window of
          # history. The queued merge commit is "Merge pull request #N from
          # <owner>/release-please--..." with the release commit "chore(main):
          # release X.Y.Z" in its body, so its full message (%B) identifies a
          # release merge. Two traps this avoids:
          #   1. The release commit is the merge commit's SECOND parent, so it
          #      is absent from the first-parent history the shallow merge-queue
          #      checkout traverses — the old "git log --max-count=10" grep for
          #      the release subject silently missed it and ran the full suite.
          #   2. A 10-commit window false-positives: a recent release MERGE
          #      ("Merge pull request ... release-please--...") lingers in the
          #      window of later, non-release PRs and would wrongly skip them.
          # HEAD-only is both robust (no traversal) and specific (this group).
          if [[ "$EVENT" == "merge_group" ]] && git log -1 --format='%B' | grep -qE 'release-please--|^chore\(main\): release'; then
            echo "is-release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "is-release=false" >> "$GITHUB_OUTPUT"
        env:
          BRANCH: ${{ github.head_ref }}
          EVENT: ${{ github.event_name }}

  quality:
    needs: [detect-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: needs.detect-release.outputs.is-release != 'true'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: needs.detect-release.outputs.is-release != 'true'
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        if: needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun install --frozen-lockfile
      - name: Type check
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun run typecheck
      - name: Biome CI
        if: needs.detect-release.outputs.is-release != 'true'
        run: bunx biome ci .
      - name: Mock isolation compliance check
        if: needs.detect-release.outputs.is-release != 'true'
        shell: bash
        run: chmod +x scripts/check-mock-cleanup.sh && bash scripts/check-mock-cleanup.sh
      - name: Engineering invariant checks
        if: needs.detect-release.outputs.is-release != 'true'
        shell: bash
        run: chmod +x scripts/check-invariants.sh && bash scripts/check-invariants.sh
      - name: Tool registration coherence check
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun run scripts/check-tool-registration.ts
      - name: Cross-contamination check (mock.module / vi.mock leaks)
        if: needs.detect-release.outputs.is-release != 'true'
        shell: bash
        run: chmod +x scripts/check-cross-contamination.sh && bash scripts/check-cross-contamination.sh

  # Two-tier CI: on pull_request, run ubuntu-only with 4 shards for fast feedback.
  # On merge_group (merge queue), run the full 3-OS matrix for merge safety.
  # On release-please branches, all steps are skipped via detect-release job
  # (version bumps don't need tests — applies to both PR and merge-queue tiers).
  # Test files are discovered automatically via find and distributed round-robin
  # across shards — no hardcoded file lists, no duplication.
  unit:
    needs: [detect-release, quality]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'merge_group' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
        shard: [1, 2, 3, 4]
    runs-on: ${{ matrix.os }}
    # 40m: was 90m before sharding (PR #1245). With 4 shards (~263 files each),
    # per-shard runtime is ~7-15 min on ubuntu/macOS and ~20-25 min on Windows
    # (4-7× slower GitHub runners, see PR #1245). 40m gives Windows headroom.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: needs.detect-release.outputs.is-release != 'true'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: needs.detect-release.outputs.is-release != 'true'
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        id: cache-bun
        if: needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
            ${{ runner.os }}-bun
      - name: Install dependencies
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun install --frozen-lockfile
      # dist/ is generated output and no longer committed (#1047); build it so the
      # tests under tests/unit/build/ that load the bundle have a dist/ to read.
      - name: Build
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun run build
      - name: Collect and partition test files
        if: needs.detect-release.outputs.is-release != 'true'
        shell: bash
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          find tests/unit -name '*.test.ts' -type f | sort > "$tmpdir/all-tests.txt"
          num_shards=4
          awk -v s="$SHARD" -v n="$num_shards" '(NR - 1) % n == (s - 1)' "$tmpdir/all-tests.txt" > "$tmpdir/shard-tests.txt"
          if [ ! -s "$tmpdir/shard-tests.txt" ]; then
            echo "::error::No test files found for shard ${SHARD}"
            exit 1
          fi
          echo "Shard ${SHARD}/${num_shards}"
      - name: Run unit tests
        if: needs.detect-release.outputs.is-release != 'true'
        shell: bash
        run: |
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            # No --coverage here: per-file coverage is overwritten each invocation
            # and never aggregated. The coverage gate (the dedicated coverage job)
            # owns the full-suite measurement; instrumenting every sharded test
            # process was pure overhead on every cell.
            bun scripts/ci/run-test-with-timeout.ts "$f" --timeout 120000 --kill-timeout 180 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError|\[TIMEOUT\])" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
            # Surface timing and timeout info to CI output (not just temp file)
            grep -E "^\[TIMING\]|^\[TIMEOUT\]" "$tmp" || true
            rm -f "$tmp"
          done < "$tmpdir/shard-tests.txt"
          exit $failed
      # NOTE: the coverage gate used to run here as an extra step on
      # `unit (ubuntu-latest, 1)`, which made that one cell execute the entire
      # unit suite twice (sharded run + full-suite coverage run) inside the 40m
      # budget — ~30-35 min in practice, intermittently timing out and blocking
      # the merge queue (PR #1573). It now lives in the dedicated `coverage` job
      # below so the full-suite run gets its own timeout and the unit cells stay
      # fast. Blocking power is NOT automatic: nothing here `needs: coverage`, so
      # the gate only blocks the queue once `coverage` is added to ruleset
      # 17809658's required status checks. That must happen AFTER this lands on
      # main (adding it earlier blocks other open PRs whose merge groups don't
      # yet define this job). Until then the gate runs but does not block.

  # Merge-queue-only coverage gate. Runs the full unit suite once with coverage
  # and enforces the line-coverage threshold. Isolated from the `unit` job so the
  # inherently ~26-31 min full-suite coverage measurement gets its own generous
  # timeout instead of stacking onto a sharded unit cell's 40m budget (see the
  # NOTE in the `unit` job above and PR #1573). On pull_request all steps are
  # skipped and the job reports success to satisfy the required check without
  # doing work (same pattern as integration/smoke). Skipped for release-please
  # branches (version bumps don't change coverage).
  coverage:
    needs: [detect-release, quality]
    runs-on: ubuntu-latest
    # Standalone cost: ~2-3 min setup/build + ~26-31 min full-suite coverage
    # (the measurement alone has been observed at 30.6 min, PR #1566) = ~29-34 min
    # worst case. This job does NOT run the sharded suite, so it sheds the ~3.5 min
    # that helped push the old in-`unit` cell to its 40m cap. The cap balances two
    # ceilings: it must clear the ~34 min worst-observed run (60m leaves ~26 min
    # for slow-runner / cache-miss variance) AND stay under the merge_queue
    # ruleset's check_response_timeout_minutes: 60 end-to-end, since coverage runs
    # after `quality` (~1 min) via `needs` — total ~35 min < 60. This
    # makes a timeout very unlikely for a normal run by removing the structural
    # double-run; it is not an absolute guarantee against a pathologically slow runner.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun install --frozen-lockfile
      # The full suite includes tests/unit/build/ tests that load the bundle, so
      # dist/ must exist (matches the unit job's rationale).
      - name: Build
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun run build
      - name: Coverage gate enforcement
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        shell: bash
        run: |
          set -e
          echo "Running coverage measurement for gate enforcement..."
          # Run the full unit test suite with coverage (no --smol: that flag
          # crashes Bun with SIGILL when combined with --coverage on large suites).
          bun test --coverage tests/unit/ --timeout 60000 > coverage-output.txt 2>&1 || true
          # Extract line coverage from "All files" row using awk.
          # Bun's coverage table columns: File | % Funcs | % Lines | Uncovered Line #s
          awk -F'|' '/All files/ { gsub(/ /,"",$3); print substr($3, 1, 5); exit }' coverage-output.txt > coverage-value.txt
          if [ ! -s coverage-value.txt ]; then
            echo "::warning::Could not parse coverage output"
            echo "0" > coverage-value.txt
          fi
          read -r COVERAGE < coverage-value.txt || COVERAGE="0"
          THRESHOLD=41.48
          echo "Coverage: ${COVERAGE}% (threshold: ${THRESHOLD}%)"
          if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
            echo "::error::Coverage gate failed: ${COVERAGE}% < ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage gate passed: ${COVERAGE}% >= ${THRESHOLD}%"
      - name: Upload coverage report
        if: always() && github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: |
            coverage-output.txt
            coverage/lcov.info
          if-no-files-found: warn

  # Merge-queue-only: on pull_request all steps are skipped, job reports success
  # to satisfy required checks without doing work. Also skipped for release-please.
  integration:
    needs: [detect-release, unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun install --frozen-lockfile
      - name: Integration tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        shell: bash
        run: |
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-int-*' EXIT
          for f in tests/integration/*.test.ts ./test/*.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-int-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed

  # Release-please PRs skip package-check (version bumps don't change the bundle).
  package-check:
    needs: [detect-release, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: needs.detect-release.outputs.is-release != 'true'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: needs.detect-release.outputs.is-release != 'true'
        with:
          bun-version: "1.3.13"
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        if: needs.detect-release.outputs.is-release != 'true'
        with:
          node-version: "22"
      - name: Cache bun dependencies
        if: needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun install --frozen-lockfile
      - name: Build
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun run build
      - name: Validate packed npm artifact
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun run package:smoke

  # Release-please PRs skip security tests (version bumps don't affect security).
  security:
    needs: [detect-release, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: needs.detect-release.outputs.is-release != 'true'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: needs.detect-release.outputs.is-release != 'true'
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        if: needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun install --frozen-lockfile
      - name: Security tests
        if: needs.detect-release.outputs.is-release != 'true'
        run: bun test tests/security --timeout 120000

  # Merge-queue-only: on pull_request all steps are skipped, job reports success.
  php-validation:
    needs: [detect-release, quality]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        with:
          php-version: "8.2"
          tools: composer
          coverage: none
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun install --frozen-lockfile
      - name: PHP profile command surface tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun --smol test tests/unit/lang/profiles-php.test.ts --timeout 60000
      - name: PHP framework detection and command overlay tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun --smol test tests/unit/lang/framework-detector.test.ts --timeout 60000
      - name: PHP Composer ecosystem discovery tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun --smol test tests/unit/build/discovery-php.test.ts --timeout 60000
      - name: Composer audit handler tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun --smol test tests/unit/tools/pkg-audit-composer.test.ts --timeout 60000
      - name: Laravel SAST rule tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun --smol test tests/unit/tools/sast-scan-laravel.test.ts --timeout 60000
      - name: Laravel fixture detection and SAST coverage tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun --smol test tests/unit/lang/laravel-fixture.test.ts --timeout 60000

  # Merge-queue-only: on pull_request all steps are skipped, job reports success.
  rust-sandbox-runner:
    needs: [detect-release]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runners/swarm-sandbox-runner/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('runners/swarm-sandbox-runner/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Check formatting
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        working-directory: runners/swarm-sandbox-runner
        run: cargo fmt --check
      - name: Clippy lint
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        working-directory: runners/swarm-sandbox-runner
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        working-directory: runners/swarm-sandbox-runner
        run: cargo test --all-targets
      - name: Build release binary
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        working-directory: runners/swarm-sandbox-runner
        run: cargo build --release
      - name: Probe smoke test
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        working-directory: runners/swarm-sandbox-runner
        run: ./target/release/swarm-sandbox-runner.exe --probe

  # Merge-queue-only: on pull_request all steps are skipped, job reports success.
  smoke:
    needs: [detect-release, unit, integration, package-check, php-validation, rust-sandbox-runner]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun install --frozen-lockfile
      - name: Build package
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun run build
      - name: Smoke tests
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        run: bun test tests/smoke --timeout 120000
      - name: Issue #704 repro — Desktop init under Node
        # Loads the compiled dist/ under Node (the runtime OpenCode Desktop's
        # sidecar uses on macOS) and asserts the plugin's `server()` resolves
        # within 10s. Pre-fix this would hang. Runs on Linux, macOS, Windows
        # so the cycle/cap/budget guards are exercised on each OS.
        if: github.event_name == 'merge_group' && needs.detect-release.outputs.is-release != 'true'
        shell: bash
        run: node scripts/repro-704.mjs
