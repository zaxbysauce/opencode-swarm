name: CI

on:
  pull_request:
    branches: ["**"]

# Serialize CI runs for the same branch/PR to prevent double-run dist-check
# interference. Old runs are NOT cancelled because cancelling leaves stale
# check statuses that persist on PRs and block merging even after a new
# successful run completes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck
      - name: Biome CI
        run: bunx biome ci .
      - name: Mock isolation compliance check
        shell: bash
        run: chmod +x scripts/check-mock-cleanup.sh && bash scripts/check-mock-cleanup.sh
      - name: Engineering invariant checks
        shell: bash
        run: chmod +x scripts/check-invariants.sh && bash scripts/check-invariants.sh
      - name: Cross-contamination check (mock.module / vi.mock leaks)
        shell: bash
        run: chmod +x scripts/check-cross-contamination.sh && bash scripts/check-cross-contamination.sh

  unit:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        id: cache-bun
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
            ${{ runner.os }}-bun
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Unit tests (hooks - guardrails)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for f in tests/unit/hooks/guardrails*.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed
      - name: Unit tests (destructive command guard - all platforms)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for f in tests/unit/hooks/destructive-command*.test.ts tests/unit/hooks/incident-replay*.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              # bun exited non-zero — check if it was a real failure or crash
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed
      - name: Unit tests (hooks - knowledge types/validator/store)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/knowledge-types*.test.ts tests/unit/hooks/knowledge-validator*.test.ts tests/unit/hooks/knowledge-registration*.test.ts tests/unit/hooks/knowledge-store*.test.ts tests/unit/hooks/knowledge-quarantine*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - knowledge reader/migrator)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/knowledge-reader*.test.ts tests/unit/hooks/knowledge-migrator*.test.ts tests/unit/hooks/knowledge-application*.test.ts tests/unit/hooks/knowledge-schema-v2*.test.ts tests/unit/hooks/knowledge-contextual-retrieval*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - knowledge injector)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/knowledge-injector*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - knowledge-curator)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/knowledge-curator*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - curator)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/curator*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - hive)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/hive*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - system-enhancer load-evidence)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/system-enhancer-load-evidence*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - system-enhancer)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/system-enhancer-adversarial.attack.test.ts tests/unit/hooks/system-enhancer-adversarial.test.ts tests/unit/hooks/system-enhancer-coder-context.test.ts tests/unit/hooks/system-enhancer-compaction.test.ts tests/unit/hooks/system-enhancer-context-budget-wiring.test.ts tests/unit/hooks/system-enhancer-drift.test.ts tests/unit/hooks/system-enhancer-evidence.adversarial.test.ts tests/unit/hooks/system-enhancer-evidence.test.ts tests/unit/hooks/system-enhancer-handoff.test.ts tests/unit/hooks/system-enhancer-hf1b-adversarial.test.ts tests/unit/hooks/system-enhancer-hf1b.test.ts tests/unit/hooks/system-enhancer-lang-constraints-adversarial.test.ts tests/unit/hooks/system-enhancer-lang-constraints.test.ts tests/unit/hooks/system-enhancer-retro.test.ts tests/unit/hooks/system-enhancer-reviewer-checklist-adversarial.test.ts tests/unit/hooks/system-enhancer-reviewer-checklist.test.ts tests/unit/hooks/system-enhancer-test-constraints.test.ts tests/unit/hooks/system-enhancer-v6.test.ts tests/unit/hooks/system-enhancer-v61.test.ts tests/unit/hooks/system-enhancer-v62-adversarial.test.ts tests/unit/hooks/system-enhancer-v62.test.ts tests/unit/hooks/system-enhancer.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - delegation)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/delegation*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - adversarial-detector)
        shell: bash
        run: |
          failed=0
          for f in tests/unit/hooks/adversarial-detect*.test.ts; do
            [ -f "$f" ] || continue
            if ! bun --smol test "$f" --timeout 120000; then
              failed=1
            fi
          done
          exit $failed
      - name: Unit tests (hooks - remaining)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for f in tests/unit/hooks/advisory*.test.ts tests/unit/hooks/agent*.test.ts tests/unit/hooks/co-change*.test.ts tests/unit/hooks/compaction*.test.ts tests/unit/hooks/context*.test.ts tests/unit/hooks/dark*.test.ts tests/unit/hooks/extractors*.test.ts tests/unit/hooks/full-auto*.test.ts tests/unit/hooks/gate*.test.ts tests/unit/hooks/log*.test.ts tests/unit/hooks/message*.test.ts tests/unit/hooks/mode-*.test.ts tests/unit/hooks/model*.test.ts tests/unit/hooks/phase*.test.ts tests/unit/hooks/pipeline*.test.ts tests/unit/hooks/plan*.test.ts tests/unit/hooks/review-receipt*.test.ts tests/unit/hooks/self*.test.ts tests/unit/hooks/steering*.test.ts tests/unit/hooks/system-message*.test.ts tests/unit/hooks/telemetry-guardrails*.test.ts tests/unit/hooks/tool*.test.ts tests/unit/hooks/trajectory*.test.ts tests/unit/hooks/utils*.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              # bun exited non-zero — check if it was a real failure or crash
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed
      - name: Unit tests (commands, config)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          # Per-file isolation to prevent --smol cache poisoning (#330).
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for dir in tests/unit/commands tests/unit/config; do
            for f in "$dir"/*.test.ts; do
              [ -f "$f" ] || continue
              tmp="$tmpdir/bun-out-$$-${f##*/}"
              exit_code=0
              bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
              if [ $exit_code -ne 0 ]; then
                # bun exited non-zero — check if it was a real failure or crash
                if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                  echo "::error file=$f::FAILED: $f"
                  failed=1
                fi
              fi
            done
          done
          exit $failed
      - name: Unit tests (cli)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          tmp="$tmpdir/bun-out-cli-$$"
          exit_code=0
          bun --smol test tests/unit/cli --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
          if [ $exit_code -ne 0 ]; then
            # bun exited non-zero — check if it was a real failure or crash
            if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
              exit 1
            fi
          fi
      - name: Unit tests (tools)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          # Run each tools test file in its own process to prevent
          # --smol module cache poisoning across files (#330).
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for f in tests/unit/tools/*.test.ts; do
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              # bun exited non-zero — check if it was a real failure or crash
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed
      - name: Unit tests (services, build, quality, sast, sbom, scripts)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          # Per-file isolation to prevent --smol cache poisoning (#330).
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for dir in tests/unit/services tests/unit/build tests/unit/quality tests/unit/sast tests/unit/sbom tests/unit/scripts; do
            for f in "$dir"/*.test.ts; do
              [ -f "$f" ] || continue
              tmp="$tmpdir/bun-out-$$-${f##*/}"
              exit_code=0
              bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
              if [ $exit_code -ne 0 ]; then
                # bun exited non-zero — check if it was a real failure or crash
                if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                  echo "::error file=$f::FAILED: $f"
                  failed=1
                fi
              fi
            done
          done
          exit $failed
      - name: Unit tests (sandbox)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          # Per-file isolation to prevent --smol cache poisoning (#330).
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          while IFS= read -r -d '' f; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
            rm -f "$tmp"
          done < <(find tests/unit/sandbox -name '*.test.ts' -type f -print0)
          exit $failed
      - name: Unit tests (state, agents, knowledge, evidence, plan, misc)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          # Per-file isolation to prevent --smol cache poisoning (#330).
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for dir in tests/unit/adversarial tests/unit/agents tests/unit/background tests/unit/context tests/unit/council tests/unit/diff tests/unit/evidence tests/unit/git tests/unit/helpers tests/unit/knowledge tests/unit/lang tests/unit/output tests/unit/parallel tests/unit/plan tests/unit/session tests/unit/skills tests/unit/types tests/unit/utils; do
            for f in "$dir"/*.test.ts; do
              [ -f "$f" ] || continue
              tmp="$tmpdir/bun-out-$$-${f##*/}"
              exit_code=0
              bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
              if [ $exit_code -ne 0 ]; then
                # bun exited non-zero — check if it was a real failure or crash
                if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                  echo "::error file=$f::FAILED: $f"
                  failed=1
                fi
              fi
              rm -f "$tmp"
            done
          done
          # Standalone test files
          for f in tests/unit/cli-dispatch.test.ts tests/unit/index-commands.test.ts tests/unit/stale-delegation-guard.test.ts tests/unit/state-invocation-windows.test.ts tests/unit/state-rehydrate.test.ts tests/unit/state-turbo-mode.test.ts tests/unit/state-workflow-guard.adversarial.test.ts tests/unit/state-workflow-guard.test.ts tests/unit/state.adversarial-scope.test.ts tests/unit/state.adversarial.test.ts tests/unit/state.rehydrate.adversarial.test.ts tests/unit/state.test.ts tests/unit/version-bump.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              # bun exited non-zero — check if it was a real failure or crash
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
            rm -f "$tmp"
          done
          exit $failed

  integration:
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Integration tests
        shell: bash
        run: |
          # Per-file isolation to prevent module cache poisoning and process.chdir
          # contamination across integration test files (#330 pattern).
          set -o pipefail
          IFS=$'\n'
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-int-*' EXIT
          for f in tests/integration/*.test.ts ./test/*.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-int-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed

  dist-check:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Check dist/ for uncommitted drift
        shell: bash
        run: |
          # Normalize .bun cache paths in COMMITTED dist for cross-platform consistency.
          # Windows bun produces node_modules/.bun/PACKAGE@VERSION/node_modules/PACKAGE
          # while Linux bun produces node_modules/PACKAGE.
          # After build, dist/ has clean Linux paths. We must normalize the committed
          # (git index) side before comparing, not the freshly built working tree.
          #
          # Also normalize var __dirname = "..." values: bun ESM bundles embed the
          # build-time source path, which differs between Windows and Linux builders.
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          dist_committed="$tmpdir/dist-committed"
          mkdir -p "$dist_committed"
          git archive HEAD dist/ | tar -x -C "$dist_committed"
          find "$dist_committed/dist/" -name "*.js" -type f -exec sed -i \
            -e 's|node_modules/\.bun/[^/]\+/node_modules/|node_modules/|g' \
            -e 's/\r$//' \
            -e 's|var __dirname = "[^"]*"|var __dirname = "__DIRNAME_NORMALIZED__"|g' {} +
          # Normalize __dirname in the freshly built dist too (Linux vs Windows paths).
          find dist/ -name "*.js" -type f -exec sed -i \
            -e 's|var __dirname = "[^"]*"|var __dirname = "__DIRNAME_NORMALIZED__"|g' {} +
          # Remove gitignored paths from the freshly built dist before comparing.
          # These are intentionally excluded from commits (see .gitignore lines 29-35).
          rm -rf dist/build/ dist/quality/ dist/sbom/
          rm -f dist/tools/build-check.d.ts dist/tools/pre-check-batch.d.ts \
                dist/tools/quality-budget.d.ts dist/tools/sbom-generate.d.ts
          diff -r "$dist_committed/dist/" dist/ || {
            echo "ERROR: dist/ has uncommitted changes after build."
            echo ""
            echo "Recovery (run these commands in order):"
            echo "  1. bun install --frozen-lockfile --force  # refresh nested deps to match CI"
            echo "  2. bun run build                         # regenerate dist/"
            echo "  3. Verify the dist/ diff is expected: git diff -- dist/"
            echo "  4. Commit the regenerated dist/ and push"
            echo ""
            echo "Common causes:"
            echo "  - Local bun version differs from CI (CI pins bun 1.3.13)"
            echo "  - Nested dependency versions differ between local and CI install"
            echo "  - Stale dist/ after rebase on a newer origin/main"
            exit 1
          }
          rm -rf "$dist_committed"

  package-check:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.13"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Validate packed npm artifact
        run: bun run package:smoke

  security:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Security tests
        run: bun test tests/security --timeout 120000

  php-validation:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: PHP profile command surface tests
        run: bun --smol test tests/unit/lang/profiles-php.test.ts --timeout 60000
      - name: PHP framework detection and command overlay tests
        run: bun --smol test tests/unit/lang/framework-detector.test.ts --timeout 60000
      - name: PHP Composer ecosystem discovery tests
        run: bun --smol test tests/unit/build/discovery-php.test.ts --timeout 60000
      - name: Composer audit handler tests
        run: bun --smol test tests/unit/tools/pkg-audit-composer.test.ts --timeout 60000
      - name: Laravel SAST rule tests
        run: bun --smol test tests/unit/tools/sast-scan-laravel.test.ts --timeout 60000
      - name: Laravel fixture detection and SAST coverage tests
        run: bun --smol test tests/unit/lang/laravel-fixture.test.ts --timeout 60000

  rust-sandbox-runner:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runners/swarm-sandbox-runner/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('runners/swarm-sandbox-runner/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Check formatting
        working-directory: runners/swarm-sandbox-runner
        run: cargo fmt --check
      - name: Clippy lint
        working-directory: runners/swarm-sandbox-runner
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        working-directory: runners/swarm-sandbox-runner
        run: cargo test --all-targets
      - name: Build release binary
        working-directory: runners/swarm-sandbox-runner
        run: cargo build --release
      - name: Probe smoke test
        working-directory: runners/swarm-sandbox-runner
        run: ./target/release/swarm-sandbox-runner.exe --probe

  smoke:
    needs: [unit, integration, dist-check, package-check, php-validation, rust-sandbox-runner]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build package
        run: bun run build
      - name: Smoke tests
        run: bun test tests/smoke --timeout 120000
      - name: Issue #704 repro — Desktop init under Node
        # Loads the compiled dist/ under Node (the runtime OpenCode Desktop's
        # sidecar uses on macOS) and asserts the plugin's `server()` resolves
        # within 10s. Pre-fix this would hang. Runs on Linux, macOS, Windows
        # so the cycle/cap/budget guards are exercised on each OS.
        shell: bash
        run: node scripts/repro-704.mjs
