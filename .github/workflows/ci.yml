name: CI

on:
  pull_request:
    branches: ["**"]

# Serialize CI runs for the same branch/PR to prevent double-run dist-check
# interference. Old runs are NOT cancelled because cancelling leaves stale
# check statuses that persist on PRs and block merging even after a new
# successful run completes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck
      - name: Biome CI
        run: bunx biome ci .
      - name: Mock isolation compliance check
        shell: bash
        run: chmod +x scripts/check-mock-cleanup.sh && bash scripts/check-mock-cleanup.sh
      - name: Engineering invariant checks
        shell: bash
        run: chmod +x scripts/check-invariants.sh && bash scripts/check-invariants.sh
      - name: Cross-contamination check (mock.module / vi.mock leaks)
        shell: bash
        run: chmod +x scripts/check-cross-contamination.sh && bash scripts/check-cross-contamination.sh

  unit:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"
      - name: Cache bun dependencies
        id: cache-bun
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
            ${{ runner.os }}-bun
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Unit tests (hooks - guardrails)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for f in tests/unit/hooks/guardrails*.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
                echo "::error file=$f::FAILED: $f"
                failed=1
              fi
            fi
          done
          exit $failed
      - name: Unit tests (destructive command guard - all platforms)
        shell: bash
        run: |
          set -o pipefail
          IFS=$'\n'
          failed=0
          tmpdir="${RUNNER_TEMP:-${TEMP:-/tmp}}"
          trap 'rm -f "$tmpdir"/bun-out-$$-*' EXIT
          for f in tests/unit/hooks/destructive-command*.test.ts tests/unit/hooks/incident-replay*.test.ts; do
            [ -f "$f" ] || continue
            tmp="$tmpdir/bun-out-$$-${f##*/}"
            exit_code=0
            bun --smol test "$f" --timeout 120000 > "$tmp" 2>&1 || exit_code=$?
            if [ $exit_code -ne 0 ]; then
              # bun exited non-zero — check if it was a real failure or crash
              if grep -qE "^[[:space:]]*(FAIL|✗|AssertionError)" "$tmp"; then
