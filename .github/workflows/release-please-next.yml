name: release-please-next

on:
  push:
    branches: [next]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: next

  publish-npm-next:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: next

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.x"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm i -g npm@11.5.2

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Publish @opencode-swarm/telemetry (next)
        run: cd packages/telemetry && npm publish --tag next --access public 2>&1 | tee /tmp/publish.log; EC=${PIPESTATUS[0]}; if [ $EC -eq 0 ]; then echo "Published successfully"; elif grep -q "E403\|previously published" /tmp/publish.log; then echo "Already published — skipping"; else cat /tmp/publish.log; exit $EC; fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @opencode-swarm/core (next)
        run: cd packages/core && npm publish --tag next --access public 2>&1 | tee /tmp/publish.log; EC=${PIPESTATUS[0]}; if [ $EC -eq 0 ]; then echo "Published successfully"; elif grep -q "E403\|previously published" /tmp/publish.log; then echo "Already published — skipping"; else cat /tmp/publish.log; exit $EC; fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @opencode-swarm/claude-code (next)
        run: cd packages/claude-code && npm publish --tag next --access public 2>&1 | tee /tmp/publish.log; EC=${PIPESTATUS[0]}; if [ $EC -eq 0 ]; then echo "Published successfully"; elif grep -q "E403\|previously published" /tmp/publish.log; then echo "Already published — skipping"; else cat /tmp/publish.log; exit $EC; fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish opencode-swarm (next)
        run: cd packages/opencode && npm publish --tag next --access public 2>&1 | tee /tmp/publish.log; EC=${PIPESTATUS[0]}; if [ $EC -eq 0 ]; then echo "Published successfully"; elif grep -q "E403\|previously published" /tmp/publish.log; then echo "Already published — skipping"; else cat /tmp/publish.log; exit $EC; fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
